<html lang="en" class="dark">
<head>

        tailwind.config = {
            darkMode: 'class',

                    fontFamily: {

                    colors: {

                        },
                        accent: {
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                        },
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 2s infinite',
                        'float-slow': 'float 8s ease-in-out 1s infinite',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                        'orbit': 'orbit 20s linear infinite',
                        'orbit-reverse': 'orbit 25s linear infinite reverse',
                        'drift': 'drift 15s ease-in-out infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                        'gradient-shift': 'gradientShift 8s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '0.6', boxShadow: '0 0 20px rgba(51,102,255,0.3)' },
                            '50%': { opacity: '1', boxShadow: '0 0 60px rgba(51,102,255,0.7)' },
                        },
                        orbit: {
                            '0%': { transform: 'rotate(0deg) translateX(150px) rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg) translateX(150px) rotate(-360deg)' },
                        },
                        drift: {
                            '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
                            '25%': { transform: 'translate(30px, -20px) scale(1.05)' },
                            '50%': { transform: 'translate(-15px, 25px) scale(0.95)' },
                            '75%': { transform: 'translate(-25px, -15px) scale(1.02)' },

                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },

                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        gradientShift: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },

                    },
                },

    </script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #0f0f1a;
            --glass-bg: rgba(15, 15, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.03);
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b8;
            --accent-glow: #3366ff;

        }

        * {
            scroll-behavior: smooth;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: default;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Glassmorphism utility */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 var(--glass-highlight);
        }

        .glass-strong {
            background: rgba(20, 20, 40, 0.75);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Glow effects */
        .glow-blue {
            box-shadow: 0 0 40px rgba(51, 102, 255, 0.25), 0 0 80px rgba(51, 102, 255, 0.1);
        }
        .glow-purple {
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.25), 0 0 80px rgba(139, 92, 246, 0.1);
        }
        .glow-text {
            text-shadow: 0 0 30px rgba(51, 102, 255, 0.5), 0 0 60px rgba(51, 102, 255, 0.25);
        }

        /* Animated grid background */
        .grid-bg {
            background-image:
                linear-gradient(rgba(51, 102, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(51, 102, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        /* Particle canvas */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Gradient orb */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        /* Spotlight hover effect */
        .spotlight-card {
            position: relative;
            overflow: hidden;
        }
        .spotlight-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                    rgba(51, 102, 255, 0.3) 0%,
                    transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
            pointer-events: none;
        }
        .spotlight-card:hover::before {
            opacity: 1;
        }

        /* Shimmer effect */
        .shimmer-border {
            position: relative;
        }
        .shimmer-border::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: linear-gradient(120deg,
                    transparent 30%,
                    rgba(51, 102, 255, 0.4) 45%,
                    rgba(139, 92, 246, 0.4) 55%,
                    transparent 70%);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
            z-index: -1;
            opacity: 0.6;
        }

        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #3366ff, #8b5cf6, #a78bfa, #3366ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 8s ease-in-out infinite;
        }

        .gradient-text-warm {
            background: linear-gradient(135deg, #f59e0b, #ef4444, #f59e0b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease-in-out infinite;
        }

        /* Card hover lift */
        .hover-lift {
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                box-shadow 0.4s ease;
        }
        .hover-lift:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5), 0 0 60px rgba(51, 102, 255, 0.2);
        }

        /* Stat counter */
        .stat-number {
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
            letter-spacing: -0.02em;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .orb {
                filter: blur(80px);
                opacity: 0.2;
            }
            .glass {
                backdrop-filter: blur(20px);
            }
        }
    </style>
</head>
<body class="bg-[#0a0a0f] text-[#f0f0f5] min-h-screen">
    <div id="root"></div>

    <!-- Particle Canvas -->
    <canvas id="particles-canvas"></canvas>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const { motion, AnimatePresence, useScroll, useTransform, useSpring, useInView, useAnimation } = FramerMotion;

        // ========================================
        // PARTICLE SYSTEM
        // ========================================
        const ParticleCanvas = () => {
            const canvasRef = useRef(null);
            const mouseRef = useRef({ x: 0, y: 0 });
            const particlesRef = useRef([]);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationId;
                let w, h;

                const resize = () => {
                    w = canvas.width = window.innerWidth;
                    h = canvas.height = window.innerHeight;
                };
                resize();
                window.addEventListener('resize', resize);

                // Create particles
                const createParticles = () => {
                    const count = Math.min(Math.floor((w * h) / 12000), 200);
                    particlesRef.current = Array.from({ length: count }, () => ({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        size: Math.random() * 1.8 + 0.4,
                        speedX: (Math.random() - 0.5) * 0.3,
                        speedY: (Math.random() - 0.5) * 0.3,
                        opacity: Math.random() * 0.5 + 0.15,
                        pulse: Math.random() * Math.PI * 2,
                        pulseSpeed: Math.random() * 0.02 + 0.005,
                    }));
                };
                createParticles();

                const animate = () => {
                    ctx.clearRect(0, 0, w, h);
                    const particles = particlesRef.current;

                    particles.forEach((p) => {
                        p.x += p.speedX;
                        p.y += p.speedY;
                        p.pulse += p.pulseSpeed;

                        // Wrap around
                        if (p.x < -20) p.x = w + 20;
                        if (p.x > w + 20) p.x = -20;
                        if (p.y < -20) p.y = h + 20;
                        if (p.y > h + 20) p.y = -20;

                        // Mouse attraction
                        const dx = mouseRef.current.x - p.x;
                        const dy = mouseRef.current.y - p.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 200) {
                            const force = (200 - dist) / 200 * 0.02;
                            p.speedX += dx * force * 0.01;
                            p.speedY += dy * force * 0.01;
                        }

                        // Damping
                        p.speedX *= 0.999;
                        p.speedY *= 0.999;

                        const alpha = p.opacity + Math.sin(p.pulse) * 0.2;
                        ctx.fillStyle = `rgba(120,160,255,${Math.max(0.05, alpha)})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();

                        // Subtle glow on some particles
                        if (p.size > 1.2) {
                            ctx.fillStyle = `rgba(139,92,246,${Math.max(0.02, alpha * 0.5)})`;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    });

                    // Draw connections
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 100) {
                                ctx.strokeStyle = `rgba(100,140,255,${0.04 * (1 - dist / 100)})`;
                                ctx.lineWidth = 0.5;
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    }

                    animationId = requestAnimationFrame(animate);
                };
                animate();

                const handleMouse = (e) => {
                    mouseRef.current = { x: e.clientX, y: e.clientY };
                };
                window.addEventListener('mousemove', handleMouse);

                return () => {
                    cancelAnimationFrame(animationId);
                    window.removeEventListener('resize', resize);
                    window.removeEventListener('mousemove', handleMouse);
                };
            }, []);

            return <canvas ref={canvasRef} id="particles-canvas" />;
        };

        // ========================================
        // FLOATING ORBS
        // ========================================
        const FloatingOrbs = () => (
            <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                <div className="orb w-[500px] h-[500px] bg-blue-500/20 top-[-10%] left-[-5%] animate-drift"
                style={{animationDuration: '18s'}}></div>
                <div className="orb w-[400px] h-[400px] bg-purple-500/15 top-[40%] right-[-8%] animate-drift"
                style={{animationDuration: '22s', animationDelay: '-5s'}}></div>
                <div className="orb w-[350px] h-[350px] bg-indigo-500/12 bottom-[-5%] left-[20%] animate-drift"
                style={{animationDuration: '20s', animationDelay: '-10s'}}></div>
                <div className="orb w-[300px] h-[300px] bg-cyan-500/10 top-[60%] left-[50%] animate-drift"
                style={{animationDuration: '25s', animationDelay: '-3s'}}></div>
                <div className="orb w-[250px] h-[250px] bg-violet-500/12 top-[20%] right-[25%] animate-drift"
                style={{animationDuration: '16s', animationDelay: '-8s'}}></div>
            </div>
        );

        // ========================================
        // MOUSE GLOW FOLLOWER
        // ========================================
        const MouseGlow = () => {
            const [pos, setPos] = useState({ x: -500, y: -500 });
            const glowRef = useRef(null);

            useEffect(() => {
                const handleMouse = (e) => {
                    setPos({ x: e.clientX, y: e.clientY });
                };
                window.addEventListener('mousemove', handleMouse);
                return () => window.removeEventListener('mousemove', handleMouse);
            }, []);

            return (
                <div
                    ref={glowRef}
                    className="fixed pointer-events-none z-[1] transition-opacity duration-500"
                    style={{
                        left: pos.x - 200,
                        top: pos.y - 200,
                        width: 400,
                        height: 400,
                        background: 'radial-gradient(circle, rgba(51,102,255,0.06) 0%, rgba(139,92,246,0.03) 35%, transparent 70%)',
                        borderRadius: '50%',
                        opacity: pos.x > 0 ? 1 : 0,
                    }}
                />
            );
        };

        // ========================================
        // NAVIGATION
        // ========================================
        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 30);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = ['Features', 'Dashboard', 'Gamification', 'Vision', 'Pricing'];

            return (
                <motion.nav
                    initial={{ y: -100, opacity: 0 }}
                    animate={{ y: 0, opacity: 1 }}
                    transition={{ duration: 0.6, ease: 'easeOut' }}
                    className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${
                        scrolled
                        ? 'glass-strong py-3 shadow-2xl'
                        : 'bg-transparent py-5'
                    }`}
                >
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
                        {/* Logo */}
                        <a href="#" className="flex items-center gap-2.5 group">
                            <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/25 group-hover:shadow-blue-500/40 transition-shadow">
                                <span className="text-white font-bold text-lg font-display">A</span>
                            </div>
                            <span className="text-lg font-bold font-display tracking-tight">
                                <span className="text-white">Ascend</span>
                                <span className="gradient-text font-extrabold">OS</span>
                                <span className="text-[10px] ml-1 px-1.5 py-0.5 rounded-full bg-blue-500/20 text-blue-400 font-mono font-semibold align-super">AI</span>
                            </span>
                        </a>

                        {/* Desktop Links */}
                        <div className="hidden md:flex items-center gap-8">
                            {navLinks.map((link) => (
                                <a
                                    key={link}
                                    href={`#${link.toLowerCase()}`}
                                    className="text-sm font-medium text-gray-400 hover:text-white transition-colors relative group"
                                >
                                    {link}
                                    <span className="absolute -bottom-1 left-0 w-0 h-0.5 bg-gradient-to-r from-blue-500 to-purple-500 group-hover:w-full transition-all duration-300 rounded-full"></span>
                                </a>
                            ))}
                        </div>

                        {/* CTA */}
                        <div className="hidden md:flex items-center gap-3">
                            <button className="px-4 py-2 text-sm font-medium text-gray-300 hover:text-white transition-colors">
                                Sign In
                            </button>
                            <button className="px-5 py-2.5 text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl hover:from-blue-500 hover:to-purple-500 transition-all shadow-lg shadow-blue-500/20 hover:shadow-blue-500/40 active:scale-95">
                                Start Free →
                            </button>
                        </div>

                        {/* Mobile Toggle */}
                        <button
                            className="md:hidden p-2 text-gray-400 hover:text-white"
                            onClick={() => setMobileOpen(!mobileOpen)}
                        >
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                {mobileOpen ? (
                                    <path d="M18 6L6 18M6 6l12 12" />
                                ) : (
                                    <path d="M3 12h18M3 6h18M3 18h18" />
                                )}
                            </svg>
                        </button>
                    </div>

                    {/* Mobile Menu */}
                    <AnimatePresence>
                        {mobileOpen && (
                            <motion.div
                                initial={{ opacity: 0, height: 0 }}
                                animate={{ opacity: 1, height: 'auto' }}
                                exit={{ opacity: 0, height: 0 }}
                                className="md:hidden glass-strong mx-4 mt-3 rounded-2xl overflow-hidden"
                            >
                                <div className="p-6 flex flex-col gap-4">
                                    {navLinks.map((link) => (
                                        <a key={link} href={`#${link.toLowerCase()}`} className="text-gray-300 hover:text-white py-2 transition-colors">
                                            {link}
                                        </a>
                                    ))}
                                    <button className="mt-2 px-5 py-3 text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl">
                                        Start Free →
                                    </button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </motion.nav>
            );
        };

        // ========================================
        // SECTION WRAPPER WITH SCROLL ANIMATION
        // ========================================
        const SectionWrapper = ({ children, id, className = '' }) => {
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true, margin: '-100px' });

            return (
                <motion.section
                    ref={ref}
                    id={id}
                    initial={{ opacity: 0, y: 60 }}
                    animate={isInView ? { opacity: 1, y: 0 } : { opacity: 0, y: 60 }}
                    transition={{ duration: 0.8, ease: [0.25, 0.46, 0.45, 0.94] }}
                    className={`relative z-10 ${className}`}
                >
                    {children}
                </motion.section>
            );
        };

        // ========================================
        // HERO SECTION
        // ========================================
        const HeroSection = () => {
            const [activeUsers, setActiveUsers] = useState(0);
            const targetUsers = 128427;

            useEffect(() => {
                const duration = 2000;
                const steps = 60;
                const increment = targetUsers / steps;
                let current = 0;
                const interval = setInterval(() => {
                    current += increment;
                    if (current >= targetUsers) {
                        setActiveUsers(targetUsers);
                        clearInterval(interval);
                    } else {
                        setActiveUsers(Math.floor(current));
                    }
                }, duration / steps);
                return () => clearInterval(interval);
            }, []);

            return (
                <section className="relative min-h-screen flex items-center justify-center pt-20 pb-16 overflow-hidden z-10">
                    {/* Grid background */}
                    <div className="absolute inset-0 grid-bg z-0"></div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
                        {/* Badge */}
                        <motion.div
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ delay: 0.1, duration: 0.6 }}
                            className="inline-flex items-center gap-2 px-4 py-2 glass rounded-full mb-8 shimmer-border"
                        >
                            <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse-glow"></span>
                            <span className="text-sm text-gray-300 font-medium">Now in Public Beta</span>
                            <span className="text-xs text-gray-500 font-mono">v2.4.1</span>
                        </motion.div>

                        {/* Headline */}
                        <motion.h1
                            initial={{ opacity: 0, y: 30 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ delay: 0.2, duration: 0.8 }}
                            className="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-extrabold font-display tracking-tight leading-[1.05] mb-6"
                        >
                            <span className="text-white">Build Your Future</span>
                            <br />
                            <span className="gradient-text glow-text">With AI.</span>
                        </motion.h1>

                        {/* Subheadline */}
                        <motion.p
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ delay: 0.4, duration: 0.7 }}
                            className="text-lg sm:text-xl text-gray-400 max-w-2xl mx-auto mb-10 leading-relaxed"
                        >
                            The AI Operating System for elite students. Master learning, productivity,
                            health, research, and career growth — all powered by advanced artificial intelligence.
                        </motion.p>
