    </script>
    <style>

<body>
    <div id="root"></div>
    <canvas id="particles-canvas"></canvas>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;
        const {
            motion,
            AnimatePresence,
            useScroll,
            useTransform,
            useSpring,
            useInView,
            useAnimation,
            LayoutGroup,
            LazyMotion,
            domAnimation,
            m
        } = FramerMotion;

        // ========================================
        // UTILITY: Count Up Animation
        // ========================================
        const useCountUp = (target, duration = 2000, startCounting = true) => {
            const [count, setCount] = useState(0);
            const [hasAnimated, setHasAnimated] = useState(false);

            useEffect(() => {
                if (!startCounting || hasAnimated) return;
                setHasAnimated(true);
                const steps = 60;
                const increment = target / steps;
                const stepDuration = duration / steps;
                let current = 0;
                let step = 0;
                const interval = setInterval(() => {
                    step++;
                    current += increment;
                    if (step >= steps) {
                        setCount(target);
                        clearInterval(interval);
                    } else {
                        setCount(Math.floor(current));
                    }
                }, stepDuration);
                return () => clearInterval(interval);
            }, [target, duration, startCounting, hasAnimated]);

            return count;
        };

        // ========================================
        // PARTICLE SYSTEM
        // ========================================
        const ParticleCanvas = () => {
            const canvasRef = useRef(null);
            const mouseRef = useRef({ x: -1000, y: -1000 });
            const particlesRef = useRef([]);
            const animRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let w, h;

                const resize = () => {
                    w = canvas.width = window.innerWidth;
                    h = canvas.height = window.innerHeight;
                };
                resize();
                window.addEventListener('resize', resize);

                const count = Math.min(Math.floor((w * h) / 10000), 220);
                particlesRef.current = Array.from({ length: count }, () => ({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 1.6 + 0.3,
                    speedX: (Math.random() - 0.5) * 0.25,
                    speedY: (Math.random() - 0.5) * 0.25,
                    opacity: Math.random() * 0.45 + 0.1,
                    pulse: Math.random() * Math.PI * 2,
                    pulseSpeed: Math.random() * 0.015 + 0.004,
                }));

                const animate = () => {
                    ctx.clearRect(0, 0, w, h);
                    const particles = particlesRef.current;
                    const mx = mouseRef.current.x;
                    const my = mouseRef.current.y;

                    particles.forEach((p) => {
                        p.x += p.speedX;
                        p.y += p.speedY;
                        p.pulse += p.pulseSpeed;

                        if (p.x < -30) p.x = w + 30;
                        if (p.x > w + 30) p.x = -30;
                        if (p.y < -30) p.y = h + 30;
                        if (p.y > h + 30) p.y = -30;

                        const dx = mx - p.x;
                        const dy = my - p.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 180 && mx > 0) {
                            const force = (180 - dist) / 180 * 0.015;
                            p.speedX += dx * force * 0.008;
                            p.speedY += dy * force * 0.008;
                        }

                        p.speedX *= 0.999;
                        p.speedY *= 0.999;

                        const alpha = p.opacity + Math.sin(p.pulse) * 0.18;
                        const finalAlpha = Math.max(0.03, Math.min(0.7, alpha));

                        ctx.fillStyle = `rgba(130,160,240,${finalAlpha})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();

                        if (p.size > 1) {
                            ctx.fillStyle = `rgba(160,130,240,${finalAlpha * 0.4})`;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.size * 3.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    });

                    // Connections
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 95) {
                                const lineAlpha = 0.035 * (1 - dist / 95);
                                ctx.strokeStyle = `rgba(120,150,240,${lineAlpha})`;
                                ctx.lineWidth = 0.4;
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    }

                    animRef.current = requestAnimationFrame(animate);
                };
                animate();

                const handleMouse = (e) => {
                    mouseRef.current = { x: e.clientX, y: e.clientY };
                };
                const handleTouch = (e) => {
                    if (e.touches.length > 0) {
                        mouseRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                    }
                };
                window.addEventListener('mousemove', handleMouse);
                window.addEventListener('touchmove', handleTouch);

                return () => {
                    cancelAnimationFrame(animRef.current);
                    window.removeEventListener('resize', resize);
                    window.removeEventListener('mousemove', handleMouse);
                    window.removeEventListener('touchmove', handleTouch);
                };
            }, []);

            return <canvas ref={canvasRef} id="particles-canvas" />;
        };

        // ========================================
        // FLOATING ORBS
        // ========================================
        const FloatingOrbs = () => (
            <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                <div className="orb w-[550px] h-[550px] bg-blue-500/18 top-[-8%] left-[-6%] animate-drift"
                style={{ animationDuration: '19s' }}></div>
                <div className="orb w-[420px] h-[420px] bg-purple-500/14 top-[38%] right-[-7%] animate-drift-slow"
                style={{ animationDuration: '23s' }}></div>
                <div className="orb w-[380px] h-[380px] bg-indigo-500/11 bottom-[-6%] left-[18%] animate-drift"
                style={{ animationDuration: '21s', animationDelay: '-6s' }}></div>
                <div className="orb w-[320px] h-[320px] bg-cyan-500/9 top-[55%] left-[48%] animate-drift-slow"
                style={{ animationDuration: '26s', animationDelay: '-10s' }}></div>
                <div className="orb w-[260px] h-[260px] bg-violet-500/10 top-[18%] right-[22%] animate-drift"
                style={{ animationDuration: '17s', animationDelay: '-4s' }}></div>
            </div>
        );

        // ========================================
        // MOUSE GLOW
        // ========================================
        const MouseGlow = () => {
            const [pos, setPos] = useState({ x: -600, y: -600 });
            const rafRef = useRef(null);

            useEffect(() => {
                const handleMouse = (e) => {
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                    rafRef.current = requestAnimationFrame(() => {
                        setPos({ x: e.clientX, y: e.clientY });
                    });
                };
                window.addEventListener('mousemove', handleMouse);
                return () => {
                    window.removeEventListener('mousemove', handleMouse);
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                };
            }, []);

            const isVisible = pos.x > -200;

            return (
                <div
                    className="fixed pointer-events-none z-[1] transition-opacity duration-600"
                    style={{
                        left: pos.x - 220,
                        top: pos.y - 220,
                        width: 440,
                        height: 440,
                        background: 'radial-gradient(circle, rgba(51,102,255,0.07) 0%, rgba(139,92,246,0.035) 30%, transparent 65%)',
                        borderRadius: '50%',
                        opacity: isVisible ? 1 : 0,
                        transition: 'opacity 0.6s ease',
                    }}
                />
            );
        };

        // ========================================
        // NAVBAR
        // ========================================
        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 40);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const links = ['Features', 'Dashboard', 'Gamification', 'Vision'];

            return (
                <motion.nav
                    initial={{ y: -100, opacity: 0 }}
                    animate={{ y: 0, opacity: 1 }}
                    transition={{ duration: 0.7, ease: [0.25, 0.46, 0.45, 0.94] }}
                    className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${
                        scrolled ? 'glass-strong py-3' : 'bg-transparent py-5'
                    }`}
                >
                    <div className="max-w-7xl mx-auto px-5 sm:px-8 lg:px-10 flex items-center justify-between">
                        <a href="#" className="flex items-center gap-2.5 group flex-shrink-0">
                            <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/25 group-hover:shadow-blue-500/45 transition-shadow duration-300">
                                <span className="text-white font-bold text-lg font-display tracking-tight">A</span>
                            </div>
                            <span className="text-lg font-bold font-display tracking-tight whitespace-nowrap">
                                <span className="text-white">Ascend</span>
                                <span className="gradient-text font-extrabold">OS</span>
                                <span className="text-[9px] ml-1 px-1.5 py-0.5 rounded-full bg-blue-500/20 text-blue-400 font-mono font-semibold align-super">AI</span>
                            </span>
                        </a>

                        <div className="hidden md:flex items-center gap-8">
                            {links.map((link) => (
                                <a
                                    key={link}
                                    href={`#${link.toLowerCase()}`}
                                    className="text-sm font-medium text-gray-400 hover:text-white transition-colors relative group py-1"
                                >
                                    {link}
                                    <span className="absolute bottom-0 left-0 w-0 h-[2px] bg-gradient-to-r from-blue-500 to-purple-500 group-hover:w-full transition-all duration-350 rounded-full"></span>
                                </a>
                            ))}
                        </div>

                        <div className="hidden md:flex items-center gap-3 flex-shrink-0">
                            <button className="px-4 py-2 text-sm font-medium text-gray-400 hover:text-white transition-colors rounded-lg">
                                Sign In
                            </button>
                            <button className="px-5 py-2.5 text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl hover:from-blue-500 hover:to-purple-500 transition-all shadow-lg shadow-blue-500/20 hover:shadow-blue-500/40 active:scale-[0.97] transform">
                                Start Free →
                            </button>
                        </div>

                        <button
                            className="md:hidden p-2 text-gray-400 hover:text-white transition-colors"
                            onClick={() => setMobileOpen(!mobileOpen)}
                            aria-label="Toggle menu"
                        >
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
                                {mobileOpen ? (
                                    <>
                                        <line x1="18" y1="6" x2="6" y2="18" />
                                        <line x1="6" y1="6" x2="18" y2="18" />
                                    </>
                                ) : (
                                    <>
                                        <line x1="3" y1="12" x2="21" y2="12" />
                                        <line x1="3" y1="6" x2="21" y2="6" />
                                        <line x1="3" y1="18" x2="21" y2="18" />
                                    </>
                                )}
                            </svg>
                        </button>
                    </div>

                    <AnimatePresence>
                        {mobileOpen && (
                            <motion.div
                                initial={{ opacity: 0, height: 0 }}
                                animate={{ opacity: 1, height: 'auto' }}
                                exit={{ opacity: 0, height: 0 }}
                                transition={{ duration: 0.3 }}
                                className="md:hidden glass-strong mx-4 mt-3 rounded-2xl overflow-hidden"
                            >
                                <div className="p-5 flex flex-col gap-3">
                                    {links.map((link) => (
                                        <a
                                            key={link}
                                            href={`#${link.toLowerCase()}`}
                                            className="text-gray-300 hover:text-white py-2.5 transition-colors text-sm font-medium"
                                            onClick={() => setMobileOpen(false)}
                                        >
                                            {link}
                                        </a>
                                    ))}
                                    <button className="mt-2 px-5 py-3 text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl w-full text-center">
                                        Start Free →
                                    </button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </motion.nav>
            );
        };

        // ========================================
        // SCROLL REVEAL WRAPPER
        // ========================================
        const SectionWrapper = ({ children, id, className = '', delay = 0 }) => {
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true, margin: '-80px' });

            return (
                <motion.section
                    ref={ref}
                    id={id}
                    initial={{ opacity: 0, y: 50 }}
                    animate={isInView ? { opacity: 1, y: 0 } : { opacity: 0, y: 50 }}
                    transition={{ duration: 0.75, delay, ease: [0.25, 0.46, 0.45, 0.94] }}
                    className={`relative z-10 ${className}`}
                >
                    {children}
                </motion.section>
            );
        };

        // ========================================
        // HERO SECTION
        // ========================================
        const HeroSection = () => {
            const userCount = useCountUp(128427, 2200);
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true });

            return (
                <section ref={ref} className="relative min-h-screen flex items-center justify-center pt-24 pb-16 overflow-hidden z-10">
                    <div className="absolute inset-0 grid-bg z-0"></div>

                    <div className="max-w-7xl mx-auto px-5 sm:px-8 lg:px-10 text-center relative z-10 w-full">
                        {/* Badge */}
                        <motion.div
                            initial={{ opacity: 0, y: 25, scale: 0.95 }}
                            animate={{ opacity: 1, y: 0, scale: 1 }}
                            transition={{ delay: 0.1, duration: 0.6 }}
                            className="inline-flex items-center gap-2 px-4 py-2 glass rounded-full mb-8 shimmer-border"
                        >
                            <span className="relative flex h-2.5 w-2.5">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                            </span>
                            <span className="text-sm text-gray-300 font-medium">Now in Public Beta</span>
                            <span className="text-xs text-gray-500 font-mono bg-white/5 px-1.5 py-0.5 rounded">v2.4.1</span>
                        </motion.div>

                        {/* Headline */}
                        <motion.h1
                            initial={{ opacity: 0, y: 35 }}
